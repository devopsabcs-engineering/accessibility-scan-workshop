title: "Accessibility Scan Workshop"
description: "Learn to scan web applications for WCAG 2.2 accessibility violations using axe-core, IBM Equal Access, and custom Playwright checks."
remote_theme: just-the-docs/just-the-docs
baseurl: "/accessibility-scan-workshop"
url: "https://devopsabcs-engineering.github.io"

exclude:
  - scripts/
  - delivery/
  - .devcontainer/
  - node_modules/
  - package.json
  - package-lock.json
  - Gemfile.lock

defaults:
  - scope:
      path: "images"
    values:
      nav_exclude: true

nav_order_base: 0
heading_anchors: true
